apiVersion: apps/v1
kind: Deployment
metadata:
  name: persona0
  labels:
    app: persona0
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: persona0
  template:
    metadata:
      labels:
        app: persona0
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: persona0
          image: ghcr.io/example/persona0:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: persona0-config
          command: ["python", "-m", "src.runtime.scheduler"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["python", "-m", "src.runtime.healthcheck", "--mode", "liveness"]
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python", "-m", "src.runtime.healthcheck", "--mode", "readiness"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
